<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonFreak Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body {
            background: linear-gradient(to bottom, #0a0a0a, #1a0033);
            color: white;
            font-family: system-ui;
        }
        .neon-text {
            text-shadow: 0 0 10px #ff00ff,
                        0 0 20px #ff00ff,
                        0 0 40px #00ffff;
        }
        .glow-btn {
            box-shadow: 0 0 30px #ff00ff,
                       inset 0 0 15px #ffffff;
            transition: all 0.2s;
        }
        .glow-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 50px #00ffff;
        }
    </style>
</head>
<body class="min-h-screen pb-24">
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 bg-black/90 border-b-4 border-pink-500 p-4 flex items-center justify-between z-50">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-gradient-to-br from-pink-500 to-cyan-400 rounded-2xl flex items-center justify-center text-4xl font-black text-black neon-text">NF</div>
            <div>
                <h1 class="text-3xl font-black tracking-tighter neon-text">NEONFREAK</h1>
                <p class="text-[10px] text-cyan-400 -mt-1">LIVE CAM CHAT</p>
            </div>
        </div>
        <div class="flex items-center gap-2 bg-zinc-900 px-5 py-2 rounded-3xl border border-green-400">
            <span class="text-green-400 text-3xl font-mono">∞</span>
            <span class="text-xs text-green-400">CREDITS</span>
        </div>
    </header>

    <main class="pt-28 px-4">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 bg-red-600 text-white px-8 py-3 rounded-3xl text-xl font-bold animate-pulse">
                🔴 32784 STREAMERS ONLINE
            </div>
        </div>

        <!-- Featured Stream -->
        <div onclick="alert('🔥 Entering Private Neon Session... Enjoy the show fam 💦 (Credits auto-handled)')" 
             class="bg-zinc-900 rounded-3xl overflow-hidden border-4 border-pink-500 mb-8 cursor-pointer active:scale-95 transition">
            <div class="h-96 bg-gradient-to-br from-purple-900 via-black to-pink-950 flex items-center justify-center relative">
                <div class="text-9xl">🍑</div>
                <div class="absolute top-6 right-6 bg-red-600 px-4 py-1 rounded-full text-sm font-bold flex items-center gap-2">
                    <div class="w-3 h-3 bg-white rounded-full animate-ping"></div>
                    LIVE
                </div>
                <div class="absolute bottom-6 left-6 bg-black/70 px-4 py-1 rounded-2xl text-sm">Luna • 4.2k watching</div>
            </div>
            <div class="p-6">
                <h2 class="text-3xl font-bold mb-2">Neon Twerk & Private Chat</h2>
                <p class="text-cyan-400">Send gifts • Battles • 1:1 Video</p>
                <button class="glow-btn mt-6 w-full py-5 text-2xl font-black bg-white text-black rounded-3xl">JOIN FOR 50 CREDITS</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div onclick="alert('Stream joined!')" class="bg-zinc-900 rounded-3xl p-4 border border-cyan-400">
                <div class="h-40 bg-gradient-to-br from-blue-900 to-black rounded-2xl flex items-center justify-center text-6xl">🔥</div>
                <p class="mt-3 font-bold">Aaliyah Battle</p>
            </div>
            <div onclick="alert('Stream joined!')" class="bg-zinc-900 rounded-3xl p-4 border border-cyan-400">
                <div class="h-40 bg-gradient-to-br from-pink-900 to-black rounded-2xl flex items-center justify-center text-6xl">👀</div>
                <p class="mt-3 font-bold">VIP Room</p>
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t-4 border-pink-500 p-4 flex justify-around z-50">
        <div class="flex flex-col items-center text-pink-400"><span class="text-3xl">🏠</span><span class="text-xs">Home</span></div>
        <div class="flex flex-col items-center text-white"><span class="text-3xl">📹</span><span class="text-xs">Live</span></div>
        <div class="flex flex-col items-center text-white"><span class="text-3xl">💬</span><span class="text-xs">Chat</span></div>
        <div class="flex flex-col items-center text-white"><span class="text-3xl">🎁</span><span class="text-xs">Gifts</span></div>
        <div onclick="alert('Admin Mode Active!\nPromo Code: NF86GLOW\nInfinite Credits Unlocked\nWC Key Connected')" class="flex flex-col items-center text-green-400">
            <span class="text-3xl">🛡️</span><span class="text-xs">ADMIN</span>
        </div>
    </nav>

    <div class="fixed bottom-28 left-0 right-0 text-center text-xs text-green-400">
        WC API Connected • Chime Payouts Ready
    </div>
</body>
</html>
